<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Page Settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Card Hover Effect</title>

    <!-- External CSS File -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <!-- Card 1 -->
        <div class="card">

            <!-- Front Side -->
            <div class="face face1">
                <div class="content">
                    <img src="https://cdn-icons-png.flaticon.com/512/6062/6062646.png" alt="Code Icon">
                    <h3>Code</h3>
                </div>
            </div>

            <!-- Back Side -->
            <div class="face face2">
                <div class="content">
                    <p>
                        Learn programming and build amazing projects using modern technologies.
                    </p>
                    <a href="#">Read More</a>
                </div>
            </div>

        </div>

        <!-- Card 2 -->
        <div class="card">

            <div class="face face1">
                <div class="content">
                    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png" alt="Design Icon">
                    <h3>Design</h3>
                </div>
            </div>

            <div class="face face2">
                <div class="content">
                    <p>
                        Create beautiful and user-friendly interfaces with modern design principles.
                    </p>
                    <a href="#">Read More</a>
                </div>
            </div>

        </div>

        <!-- Card 3 -->
        <div class="card">

            <div class="face face1">
                <div class="content">
                    <img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png" alt="Launch Icon">
                    <h3>Launch</h3>
                </div>
            </div>

            <div class="face face2">
                <div class="content">
                    <p>
                        Publish your projects and share them with the world.
                    </p>
                    <a href="#">Read More</a>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
