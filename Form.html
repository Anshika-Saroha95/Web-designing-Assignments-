<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login Page</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background: linear-gradient(to right,
            #ff1a1a,
            #ff6600,
            #ffb300);
        }

        .login-box{
            width:360px;
            text-align:center;
        }

        .logo{
            font-size:70px;
            color:white;
            margin-bottom:10px;
        }

        h1{
            color:white;
            margin-bottom:25px;
            font-size:40px;
        }

        .input-box{
            width:100%;
            height:55px;
            background:rgba(255,255,255,0.35);
            margin-bottom:18px;
            display:flex;
            align-items:center;
            border-radius:5px;
            overflow:hidden;
        }

        .input-box i{
            width:60px;
            font-size:20px;
            color:white;
            border-right:1px solid rgba(255,255,255,0.4);
        }

        .input-box input{
            width:100%;
            height:100%;
            border:none;
            outline:none;
            background:transparent;
            padding-left:15px;
            font-size:16px;
            color:white;
        }

        .input-box input::placeholder{
            color:#f1f1f1;
        }

        .options{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            color:white;
            font-size:15px;
        }

        .options a{
            color:white;
            text-decoration:none;
        }

        .options a:hover{
            text-decoration:underline;
        }

        .login-btn{
            width:100%;
            height:50px;
            border:none;
            background:#8b1028;
            color:white;
            font-size:22px;
            border-radius:5px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#6f0d20;
        }

        .divider{
            margin:30px 0 20px;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:15px;
        }

        .divider::before,
        .divider::after{
            content:"";
            width:80px;
            height:1px;
            background:rgba(255,255,255,0.5);
        }

        .social-icons{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-bottom:25px;
        }

        .social-icons a{
            width:50px;
            height:50px;
            background:white;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            text-decoration:none;
            color:#8b1028;
            font-size:20px;
            transition:0.3s;
        }

        .social-icons a:hover{
            transform:scale(1.1);
        }

        .signup{
            color:white;
            font-size:18px;
        }

        .signup a{
            color:#7a0d20;
            text-decoration:none;
            font-weight:bold;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <div class="logo">
            <i class="fa-solid fa-cube"></i>
        </div>

        <h1>Account Login</h1>

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Username or Email address">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Password">
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember Me
            </label>

            <a href="#">Forgot password?</a>
        </div>

        <button class="login-btn">Login</button>

        <div class="divider">
            Or login with
        </div>

        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-google"></i></a>
        </div>

        <div class="signup">
            Don't have an account?
            <a href="#">Sign Up</a>
        </div>

    </div>

</body>
</html>
